# =============================================================================
# Nginx Server Block Configuration
# =============================================================================
# Reverse proxy to the Ovature app container with:
#   - Static asset caching
#   - API request forwarding
#   - SPA routing support
#   - Security headers
# =============================================================================

# Upstream definition for the app container
upstream app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint for load balancers
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Static assets - aggressive caching
    # Vite puts hashed assets in /assets/
    location /assets/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Cache for 1 year (assets have content hashes)
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API requests - no caching, pass through to app
    location /api/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # No caching for API
        proxy_cache off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for long-running API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # All other requests - SPA routing
    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Short cache for HTML (allows quick updates)
        add_header Cache-Control "no-cache";

        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
